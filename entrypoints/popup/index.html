<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NextRole - Cyber Careers Co-pilot</title>
    <meta name="manifest.type" content="browser_action" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #030712;
        --panel-bg: rgba(10, 15, 30, 0.65);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text-primary: #f3f4f6;
        --text-secondary: #94a3b8;
        --accent-primary: #6366f1;
        --accent-secondary: #06b6d4;
        --accent-glow: rgba(99, 102, 241, 0.25);
        --danger-color: #f43f5e;
        --danger-bg: rgba(244, 63, 94, 0.12);
        --card-bg: rgba(10, 15, 30, 0.45);
        --card-border: rgba(255, 255, 255, 0.04);
        --card-hover: rgba(17, 24, 39, 0.8);
        --font-primary: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        --font-mono: 'Space Grotesk', monospace;
      }

      body {
        margin: 0;
        padding: 0;
        width: 360px;
        min-height: 460px;
        max-height: 570px;
        background-color: var(--bg-color);
        /* Futuristic digital grid gridline overlay */
        background-image: 
          linear-gradient(rgba(99, 102, 241, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99, 102, 241, 0.02) 1px, transparent 1px);
        background-size: 20px 20px;
        background-position: center;
        color: var(--text-primary);
        font-family: var(--font-primary);
        overflow-x: hidden;
        overflow-y: auto;
        box-sizing: border-box;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .app-container {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        position: relative;
      }

      /* Decorative Cyberpunk Neon Ambient Glows */
      .app-container::before {
        content: '';
        position: absolute;
        top: -60px;
        right: -60px;
        width: 140px;
        height: 140px;
        background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      .app-container::after {
        content: '';
        position: absolute;
        bottom: -60px;
        left: -60px;
        width: 140px;
        height: 140px;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--panel-border);
        padding-bottom: 14px;
        z-index: 1;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 9px;
      }

      /* Holographic spin animation */
      @keyframes logo-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .logo-icon {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(6, 182, 212, 0.15) 100%);
        width: 28px;
        height: 28px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(6, 182, 212, 0.25);
        box-shadow: 0 0 10px rgba(6, 182, 212, 0.15);
      }

      .logo-svg {
        width: 15px;
        height: 15px;
        animation: logo-spin 15s linear infinite;
      }

      .brand-details {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .brand-name {
        font-family: var(--font-mono);
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.8px;
        background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .brand-sub {
        font-family: var(--font-mono);
        font-size: 8px;
        color: var(--accent-secondary);
        letter-spacing: 0.5px;
        font-weight: 700;
      }

      /* Pulsing Secure Status Header */
      .status-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(6, 182, 212, 0.05);
        border: 1px solid rgba(6, 182, 212, 0.12);
        padding: 4px 8px;
        border-radius: 6px;
      }

      @keyframes pulse-glow {
        0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.35); }
        70% { box-shadow: 0 0 0 5px rgba(6, 182, 212, 0); }
        100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
      }

      .status-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background-color: var(--accent-secondary);
        animation: pulse-glow 2s infinite;
      }

      .status-text {
        font-family: var(--font-mono);
        font-size: 8px;
        font-weight: 700;
        color: var(--accent-secondary);
        letter-spacing: 0.5px;
      }

      /* Sliding Capsule Navigation Menu */
      .tabs-nav {
        display: flex;
        background: rgba(10, 15, 30, 0.7);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 3px;
        margin-bottom: 4px;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        z-index: 1;
      }

      .tab-btn {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-family: var(--font-primary);
        font-size: 11.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 8px 12px;
        border-radius: 7px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        outline: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .tab-btn:hover {
        color: #ffffff;
      }

      .tab-btn.active {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.12) 0%, rgba(139, 92, 246, 0.12) 100%);
        border: 1px solid rgba(139, 92, 246, 0.2);
        color: #ffffff;
        text-shadow: 0 0 8px rgba(139, 92, 246, 0.4);
      }

      .section-title-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 4px;
        z-index: 1;
      }

      .section-title {
        font-family: var(--font-mono);
        font-size: 9.5px;
        text-transform: uppercase;
        color: var(--text-secondary);
        font-weight: 700;
        letter-spacing: 1px;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .saved-count {
        font-family: var(--font-mono);
        font-size: 9.5px;
        color: var(--accent-secondary);
        font-weight: 700;
        background: rgba(6, 182, 212, 0.08);
        border: 1px solid rgba(6, 182, 212, 0.15);
        padding: 2px 7px;
        border-radius: 4px;
      }

      .search-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 100px;
        z-index: 1;
      }

      /* Technical Modular Search Cards */
      .search-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
      }

      .search-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, rgba(6, 182, 212, 0.02), transparent);
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      .search-card:hover {
        background: var(--card-hover);
        border-color: rgba(99, 102, 241, 0.25);
        transform: translateY(-2px);
        box-shadow: 0 12px 20px -10px rgba(99, 102, 241, 0.3);
      }

      .search-card:hover::before {
        opacity: 1;
      }

      .card-details {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 0;
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(6, 182, 212, 0.08) 100%);
        border: 1px solid rgba(6, 182, 212, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-mono);
        font-weight: 700;
        color: var(--accent-secondary);
        font-size: 14px;
        flex-shrink: 0;
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.02);
      }

      .info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .company-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: -0.2px;
      }

      .search-url {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-decoration: none;
        display: inline-block;
        max-width: 175px;
        transition: color 0.2s ease;
        cursor: pointer;
      }

      .search-url:hover {
        color: var(--accent-secondary);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .btn {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.04);
        width: 28px;
        height: 28px;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        color: var(--text-secondary);
      }

      .btn-open:hover {
        background: rgba(6, 182, 212, 0.1);
        border-color: rgba(6, 182, 212, 0.3);
        color: var(--accent-secondary);
        box-shadow: 0 0 8px rgba(6, 182, 212, 0.15);
      }

      .btn-delete:hover {
        background: var(--danger-bg);
        border-color: rgba(244, 63, 94, 0.3);
        color: var(--danger-color);
        box-shadow: 0 0 8px rgba(244, 63, 94, 0.1);
      }

      /* Holographic Empty State Scanner */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 42px 20px;
        background: rgba(10, 15, 30, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: 16px;
        margin-top: 4px;
        position: relative;
        overflow: hidden;
      }

      .empty-state::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, rgba(6, 182, 212, 0.02) 0%, transparent 100%);
        pointer-events: none;
      }

      /* Custom scanner animation */
      @keyframes scan-move {
        0% { top: 10%; opacity: 0; }
        50% { opacity: 0.8; }
        100% { top: 90%; opacity: 0; }
      }

      .empty-icon {
        display: none !important; /* Hide original simple document SVG icon */
      }

      /* Holographic radar container replacing AI document icon */
      .radar-scanner {
        position: relative;
        width: 54px;
        height: 54px;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .radar-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 1.5px dashed rgba(6, 182, 212, 0.25);
        border-radius: 50%;
        animation: logo-spin 20s linear infinite;
      }

      .radar-ring-inner {
        position: absolute;
        width: 65%;
        height: 65%;
        border: 1px solid rgba(99, 102, 241, 0.2);
        border-radius: 50%;
        animation: logo-spin 10s linear infinite reverse;
      }

      .radar-beam {
        position: absolute;
        width: 100%;
        height: 1.5px;
        background: linear-gradient(90deg, transparent, var(--accent-secondary), transparent);
        top: 50%;
        animation: scan-move 3s ease-in-out infinite;
        opacity: 0.7;
      }

      .empty-title {
        font-family: var(--font-primary);
        font-size: 13.5px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 5px;
        letter-spacing: -0.2px;
      }

      .empty-desc {
        font-family: var(--font-primary);
        font-size: 11px;
        color: var(--text-secondary);
        line-height: 1.45;
        max-width: 230px;
        margin: 0;
      }

      /* Card slide removal transition animation */
      .card-exit {
        opacity: 0;
        transform: scale(0.9) translateY(-10px);
        margin-bottom: -50px;
        pointer-events: none;
      }

      /* View Panels */
      .view-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 1;
      }
      .view-panel.hidden {
        display: none !important;
      }

      /* Form inputs redesign */
      .profile-form {
        display: flex;
        flex-direction: column;
        gap: 11px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .form-group label {
        font-family: var(--font-mono);
        font-size: 8.5px;
        color: var(--text-secondary);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding-left: 2px;
      }
      .form-group input, .form-group textarea {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--panel-border);
        border-radius: 9px;
        padding: 8px 11px;
        color: var(--text-primary);
        font-family: var(--font-primary);
        font-size: 12px;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        outline: none;
        box-sizing: border-box;
        width: 100%;
        resize: vertical;
      }
      .form-group input:focus, .form-group textarea:focus {
        border-color: var(--accent-primary);
        box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        background: rgba(255, 255, 255, 0.06);
      }
      .form-group textarea {
        min-height: 52px;
      }

      /* Glowing tactical action buttons */
      .btn-save {
        width: 100%;
        background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%);
        border: none;
        border-radius: 9px;
        color: #ffffff;
        font-family: var(--font-primary);
        font-size: 12.5px;
        font-weight: 700;
        padding: 10px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 4px 14px var(--accent-glow);
        margin-top: 4px;
        outline: none;
        box-sizing: border-box;
      }
      .btn-save:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(99, 102, 241, 0.45);
        background: linear-gradient(135deg, #8b5cf6 0%, var(--accent-primary) 100%);
      }
      .btn-save:active {
        transform: translateY(0);
      }

      /* Premium Status Banner HUD */
      .premium-banner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.05) 0%, rgba(217, 119, 6, 0.05) 100%);
        border: 1px solid rgba(245, 158, 11, 0.18);
        border-radius: 10px;
        padding: 9px 12px;
        margin-bottom: 2px;
      }
      .premium-banner.active {
        background: linear-gradient(135deg, rgba(6, 182, 212, 0.05) 0%, rgba(13, 148, 136, 0.05) 100%);
        border-color: rgba(6, 182, 212, 0.25);
        box-shadow: 0 0 10px rgba(6, 182, 212, 0.05);
      }
      .premium-status {
        font-family: var(--font-mono);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #f59e0b;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .premium-banner.active .premium-status {
        color: var(--accent-secondary);
      }
      .btn-upgrade {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        color: #030712;
        border: none;
        font-family: var(--font-primary);
        font-size: 10px;
        font-weight: 800;
        padding: 5px 10px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.25s ease;
        outline: none;
        text-transform: uppercase;
        letter-spacing: 0.2px;
      }
      .btn-upgrade:hover {
        transform: translateY(-0.5px);
        box-shadow: 0 4px 10px rgba(245, 158, 11, 0.35);
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Header HUD -->
      <div class="header">
        <div class="brand">
          <div class="logo-icon">
            <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="url(#cyber-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <defs>
                <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#8b5cf6" />
                  <stop offset="100%" stop-color="#06b6d4" />
                </linearGradient>
              </defs>
              <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5" />
              <polyline points="12 2 12 22" />
              <polyline points="12 12 22 8.5" />
              <polyline points="12 12 2 8.5" />
            </svg>
          </div>
          <div class="brand-details">
            <span class="brand-name">NEXTROLE</span>
            <span class="brand-sub">// PORTAL.v1.0</span>
          </div>
        </div>
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span class="status-text">NODE: SECURE</span>
        </div>
      </div>

      <!-- Navigation Tabs Selection HUD -->
      <div class="tabs-nav">
        <button class="tab-btn active" id="tab-tracked" data-view="tracked-view">Tracked Pages</button>
        <button class="tab-btn" id="tab-profile" data-view="profile-view">My Profile</button>
      </div>

      <!-- VIEW 1: TRACKED PAGES PANEL -->
      <div id="tracked-view" class="view-panel">
        <div class="section-title-bar">
          <h2 class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="9" x2="15" y2="9"></line>
              <line x1="9" y1="13" x2="15" y2="13"></line>
              <line x1="9" y1="17" x2="15" y2="17"></line>
            </svg>
            SAVED CAREERS CHANNELS
          </h2>
          <span class="saved-count" id="saved-count">0 saved</span>
        </div>
        <div class="search-list" id="search-list">
          <!-- Loaded dynamically via popup.ts -->
        </div>
      </div>

      <!-- VIEW 2: MY RESUME PROFILE PANEL -->
      <div id="profile-view" class="view-panel hidden">
        <div class="premium-banner" id="premium-banner">
          <span class="premium-status" id="premium-status">FREE ACCOUNT</span>
          <button class="btn-upgrade" id="btn-upgrade">Upgrade ($15/mo)</button>
        </div>
        
        <form class="profile-form" id="profile-form">
          <div class="form-group">
            <label for="prof-skills">Skills (comma-separated)</label>
            <input type="text" id="prof-skills" placeholder="e.g. React, TypeScript, Node.js, PostgreSQL" required />
          </div>
          
          <div class="form-group">
            <label for="prof-experience">Work Experience</label>
            <textarea id="prof-experience" placeholder="e.g. Senior Software Engineer at TechCo (2023-Pres): Lead team of 4 engineers, optimized database performance by 30%..." required></textarea>
          </div>
          
          <div class="form-group">
            <label for="prof-education">Education</label>
            <textarea id="prof-education" placeholder="e.g. B.S. in Computer Science - University of Technology (2019-2023)" required></textarea>
          </div>
          
          <div class="form-group">
            <label for="prof-projects">Personal Projects</label>
            <textarea id="prof-projects" placeholder="e.g. NextRole: Engineered micro-scraper serving desktop notifications..." required></textarea>
          </div>
          
          <button type="submit" class="btn-save" id="btn-save-profile">Save Master Resume</button>
        </form>
      </div>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
