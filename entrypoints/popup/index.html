<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextRole</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F4F0;
      --surface: #FFFFFF;
      --card: #FFFFFF;
      --border: #000000;
      --cyan: #4A90E2;
      --cyan-dim: #2C6EBA;
      --green: #2ecc71;
      --amber: #f1c40f;
      --red: #e74c3c;
      --pink: #ff6b81;
      --purple: #9b59b6;
      --text: #000000;
      --muted: #444444;
      --mono: 'IBM Plex Mono', monospace;
      --display: 'Syne', sans-serif;
      --shadow: 3px 3px 0px #000000;
      --shadow-hover: 5px 5px 0px #000000;
      --border-width: 2px;
    }

    body {
      width: 380px;
      min-height: 200px;
      max-height: 580px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      background-image: radial-gradient(#000 1px, transparent 1px);
      background-size: 15px 15px;
    }

    /* ── Header ── */
    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 16px;
      border-bottom: 3px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      font-family: var(--display);
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .logo span { background: var(--cyan); padding: 0 4px; border: 2px solid #000; color: #fff; }
    
    .header-right { display: flex; align-items: center; gap: 8px; }
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 0;
      font-size: 11px; font-weight: 800; letter-spacing: 1px;
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
    }
    .status-pill.live {
      background: var(--green);
      color: #000;
    }
    .status-pill.paused {
      background: #ccc;
      color: #000;
    }
    .status-dot { width: 8px; height: 8px; background: currentColor; border: 1px solid #000; }
    .status-pill.live .status-dot { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      border-bottom: 3px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      height: 44px;
      background: none;
      border: none;
      border-right: 2px solid var(--border);
      color: var(--text);
      font-family: var(--display);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn:hover { background: var(--amber); }
    .tab-btn.active { background: var(--pink); color: #fff; }
    .tab-badge {
      position: absolute; top: 4px; right: 4px;
      background: var(--cyan); color: #fff;
      font-size: 10px; font-weight: 800;
      padding: 2px 6px; border: 2px solid #000;
      min-width: 20px; text-align: center;
      box-shadow: 2px 2px 0 #000;
    }

    /* ── Scrollable content ── */
    .popup-body {
      height: calc(580px - 56px - 44px - 40px); /* adjusted for footer */
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
    }
    .popup-body::-webkit-scrollbar { width: 6px; }
    .popup-body::-webkit-scrollbar-track { background: var(--surface); border-left: 2px solid #000; }
    .popup-body::-webkit-scrollbar-thumb { background: var(--cyan); border: 2px solid #000; }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: popIn 0.2s ease-out; }

    /* ── Section ── */
    .section { margin-bottom: 20px; }
    .section-label {
      font-family: var(--display);
      font-size: 12px; font-weight: 800;
      color: var(--text); text-transform: uppercase;
      background: var(--amber); display: inline-block;
      padding: 2px 6px; border: 2px solid #000;
      margin-bottom: 8px;
    }

    /* ── Status card ── */
    .status-card {
      background: var(--card);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }
    .status-info { flex: 1; }
    .status-main {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--display); font-size: 16px; font-weight: 800; color: var(--text);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .status-main .live-badge {
      font-size: 10px; font-weight: 800;
      padding: 2px 8px;
      background: var(--green); color: #000;
      border: 2px solid #000; box-shadow: 2px 2px 0 #000;
    }
    .status-main .paused-badge {
      font-size: 10px; font-weight: 800;
      padding: 2px 8px;
      background: #ccc; color: #000;
      border: 2px solid #000; box-shadow: 2px 2px 0 #000;
    }
    .status-meta { font-size: 11px; font-weight: 700; color: var(--text); }
    
    .toggle-switch {
      width: 44px; height: 24px;
      background: var(--surface);
      border: 2px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-switch.on { background: var(--green); }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 1px; left: 1px;
      width: 18px; height: 18px;
      background: #000;
      transition: transform 0.2s;
    }
    .toggle-switch.on::after { transform: translateX(20px); }

    /* ── Tag input ── */
    .tag-input-wrap {
      background: var(--card);
      border: 2px solid var(--border);
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 44px;
      cursor: text;
      transition: transform 0.1s;
    }
    .tag-input-wrap:focus-within { box-shadow: var(--shadow); transform: translate(-2px, -2px); }
    
    .tag-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--purple); border: 2px solid #000;
      color: #fff; font-size: 11px; font-weight: 700;
      padding: 4px 8px; box-shadow: 2px 2px 0 #000;
    }
    .tag-x {
      cursor: pointer; color: #000; background: #fff;
      font-size: 12px; font-weight: 800; border: 1px solid #000;
      padding: 0 4px; transition: background 0.1s;
    }
    .tag-x:hover { background: var(--red); color: #fff; }
    
    .tag-inner-input {
      border: none; background: transparent;
      outline: none; color: var(--text);
      font-family: var(--mono); font-size: 13px; font-weight: 700;
      min-width: 80px; flex: 1;
    }
    .tag-inner-input::placeholder { color: #888; font-style: italic; }

    /* ── Segmented control ── */
    .segmented {
      display: flex;
      background: var(--card);
      border: 2px solid var(--border);
      box-shadow: 2px 2px 0 #000;
    }
    .seg-btn {
      flex: 1; padding: 10px 4px;
      background: none; border: none;
      color: var(--text);
      font-family: var(--display); font-size: 11px; font-weight: 800; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
      border-right: 2px solid var(--border);
    }
    .seg-btn:last-child { border-right: none; }
    .seg-btn.active { background: var(--cyan); color: #fff; }
    .seg-btn:hover:not(.active) { background: var(--amber); }

    /* ── Footer meta ── */
    .popup-footer {
      padding: 0 16px; height: 40px;
      border-top: 3px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px; font-weight: 700;
      color: var(--text);
      background: var(--surface);
      position: absolute; bottom: 0; left: 0; right: 0;
    }
    .latency-badge { display: flex; align-items: center; gap: 6px; }
    .latency-dot { width: 10px; height: 10px; border: 2px solid #000; }
    .latency-dot.green { background: var(--green); }
    .latency-dot.yellow { background: var(--amber); }
    .latency-dot.red { background: var(--red); }
    .manage-link { color: var(--text); background: var(--amber); border: 2px solid #000; padding: 2px 8px; cursor: pointer; font-family: var(--display); text-transform: uppercase; box-shadow: 2px 2px 0 #000; transition: transform 0.1s; }
    .manage-link:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 #000; background: var(--cyan); color: #fff; }

    /* ── Watched Pages ── */
    .add-page-banner {
      background: var(--pink);
      border: 2px solid #000; box-shadow: var(--shadow);
      padding: 12px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .add-page-banner-text { font-size: 12px; font-weight: 700; color: #fff; flex: 1; }
    .btn-add-page {
      background: #fff; color: #000;
      border: 2px solid #000; box-shadow: 2px 2px 0 #000;
      padding: 6px 12px;
      font-family: var(--display); font-size: 11px; font-weight: 800; text-transform: uppercase;
      cursor: pointer; white-space: nowrap; transition: transform 0.1s; flex-shrink: 0;
    }
    .btn-add-page:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 #000; background: var(--cyan); }
    
    .watched-list { display: flex; flex-direction: column; gap: 12px; }
    .watched-row {
      background: var(--card);
      border: 2px solid var(--border); box-shadow: 2px 2px 0 #000;
      padding: 12px; display: flex; align-items: center; gap: 12px;
    }
    .watched-row.error { background: #ffeaa7; }
    .favicon-avatar {
      width: 32px; height: 32px;
      background: var(--amber); border: 2px solid #000;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--display); font-size: 16px; font-weight: 800; color: #000;
      flex-shrink: 0; box-shadow: 2px 2px 0 #000;
    }
    .watched-info { flex: 1; min-width: 0; }
    .watched-domain { font-family: var(--display); font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
    .watched-meta { font-size: 10px; font-weight: 700; margin-top: 4px; display: flex; align-items: center; gap: 6px; }
    .scrape-dot { width: 8px; height: 8px; border: 2px solid #000; flex-shrink: 0; }
    .scrape-dot.ok { background: var(--green); }
    .scrape-dot.error { background: var(--red); }
    .scrape-dot.pending { background: #ccc; }
    .scrape-dot.warning { background: var(--amber); }
    .scrape-dot.empty { background: #fff; }
    
    .new-badge {
      font-size: 10px; font-weight: 800;
      padding: 2px 6px; background: var(--pink); color: #fff;
      border: 2px solid #000; box-shadow: 2px 2px 0 #000; white-space: nowrap;
    }
    .btn-trash {
      background: #fff; border: 2px solid #000;
      color: #000; cursor: pointer;
      font-size: 14px; padding: 4px; box-shadow: 2px 2px 0 #000;
      transition: background 0.15s; flex-shrink: 0;
    }
    .btn-trash:hover { background: var(--red); color: #fff; }

    /* ── Empty states ── */
    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: var(--text);
      font-size: 13px; font-weight: 700;
      background: var(--card); border: 2px solid #000; box-shadow: 4px 4px 0 #000;
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; display: inline-block; background: var(--cyan); border: 2px solid #000; padding: 8px; box-shadow: 2px 2px 0 #000; }

    /* ── Feed ── */
    .feed-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .mark-all-btn {
      background: var(--cyan); color: #fff; border: 2px solid #000;
      padding: 6px 10px; font-family: var(--display); font-size: 10px; font-weight: 800;
      text-transform: uppercase; box-shadow: 2px 2px 0 #000; cursor: pointer; transition: transform 0.1s;
    }
    .mark-all-btn:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 #000; background: var(--amber); color: #000; }

    .feed-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 16px; }
    .feed-card {
      background: var(--card); border: 2px solid var(--border); box-shadow: 4px 4px 0 #000;
      padding: 12px; cursor: pointer; transition: transform 0.15s; position: relative;
    }
    .feed-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #000; }
    .feed-card.unseen { background: #e0f7fa; }
    .feed-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .feed-card-title { font-family: var(--display); font-size: 14px; font-weight: 800; color: var(--text); text-transform: uppercase; padding-right: 8px; }
    
    .feed-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-icon { background: #fff; border: 2px solid #000; padding: 2px 6px; cursor: pointer; box-shadow: 2px 2px 0 #000; font-size: 12px; transition: transform 0.1s; }
    .btn-icon:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 #000; }
    .btn-snooze:hover { background: var(--amber); }
    .btn-apply:hover { background: var(--green); }
    .btn-dismiss:hover { background: var(--red); color: #fff; }

    .feed-card-meta { font-size: 11px; font-weight: 700; color: var(--text); display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .feed-card-meta .dot { font-weight: 800; }
    .pill-mini { background: var(--purple); color: #fff; padding: 2px 6px; border: 2px solid #000; font-size: 9px; text-transform: uppercase; }
    
    .match-badge {
      display: inline-block; background: var(--cyan); color: #fff;
      border: 2px solid #000; font-size: 9px; font-weight: 800; text-transform: uppercase;
      padding: 2px 6px; box-shadow: 2px 2px 0 #000;
    }
    .new-dot { position: absolute; top: -6px; right: -6px; width: 14px; height: 14px; border: 2px solid #000; border-radius: 50%; background: var(--pink); box-shadow: 2px 2px 0 #000; }
    .time-label { font-size: 10px; font-weight: 700; color: var(--text); margin-left: auto; }

    /* ── Loading ── */
    .loading-spinner {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px; background: var(--card); border: 2px solid #000; box-shadow: 4px 4px 0 #000; gap: 12px; font-size: 14px; font-weight: 800; font-family: var(--display); text-transform: uppercase;
    }
    .spinner { width: 24px; height: 24px; border: 3px solid #000; border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.6s linear infinite; }
    
    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--green); border: 3px solid #000; box-shadow: 4px 4px 0 #000;
      color: #000; font-family: var(--display); font-size: 12px; font-weight: 800; text-transform: uppercase;
      padding: 10px 20px; white-space: nowrap; opacity: 0;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; z-index: 9999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="popup-header">
    <div class="logo">NEXT<span>ROLE</span></div>
    <div class="header-right">
      <div class="status-pill" id="telemetry-status-pill" style="background: #ccc; color: #000;">
        <div class="status-dot"></div>
        <span id="telemetry-status-text">OFFLINE</span>
      </div>
      <div class="status-pill paused" id="header-status-pill">
        <div class="status-dot"></div>
        <span id="header-status-text">PAUSED</span>
      </div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="monitor">Monitor</button>
    <button class="tab-btn" data-tab="watched">
      Watched Pages
    </button>
    <button class="tab-btn" data-tab="feed" id="feed-tab-btn">
      Feed
      <span class="tab-badge" id="feed-badge" style="display:none;"></span>
    </button>
    <button class="tab-btn" data-tab="settings" title="Settings">⚙️</button>
  </div>

  <!-- Body -->
  <div class="popup-body">
    <!-- ── TAB 1: MONITOR ── -->
    <div class="tab-panel active" id="tab-monitor">
      <div class="status-card">
        <div class="status-info">
          <div class="status-main">
            <span id="monitor-status-label">Monitoring</span>
            <span id="monitor-badge" class="paused-badge">PAUSED</span>
          </div>
          <div class="status-meta" id="monitor-meta">—</div>
        </div>
        <div class="toggle-switch" id="monitor-toggle"></div>
      </div>
      <button id="scan-open-pages-btn" style="background: var(--cyan); color: #fff; border: 2px solid #000; padding: 8px; width: 100%; font-family: var(--display); font-size: 11px; font-weight: 800; text-transform: uppercase; box-shadow: 2px 2px 0 #000; cursor: pointer; transition: transform 0.1s; margin-bottom: 16px;">Scan open pages now</button>

      <div class="section">
        <div class="section-label">Roles / Keywords</div>
        <div class="tag-input-wrap" id="roles-wrap">
          <input type="text" class="tag-inner-input" id="roles-input" placeholder="Add role…" />
        </div>
      </div>

      <div class="section">
        <div class="section-label">Locations</div>
        <div class="tag-input-wrap" id="locations-wrap">
          <input type="text" class="tag-inner-input" id="locations-input" placeholder="Add city or region…" />
        </div>
      </div>

      <div class="section">
        <div class="section-label">Company Watchlist</div>
        <div class="tag-input-wrap" id="companies-wrap">
          <input type="text" class="tag-inner-input" id="companies-input" placeholder="Add company…" />
        </div>
      </div>

      <div class="section">
        <div class="section-label">Alert Mode</div>
        <div class="segmented" id="alert-segmented">
          <button class="seg-btn active" data-val="instant">⚡ Instant</button>
          <button class="seg-btn" data-val="daily">📬 Daily</button>
          <button class="seg-btn" data-val="weekly">📅 Weekly</button>
        </div>
      </div>
    </div>

    <!-- ── TAB 2: WATCHED PAGES ── -->
    <div class="tab-panel" id="tab-watched">
      <div id="current-page-banner" style="display:none;"></div>
      <div id="watched-list-container">
        <div class="loading-spinner"><div class="spinner"></div> Loading…</div>
      </div>
    </div>

    <!-- ── TAB 3: FEED ── -->
    <div class="tab-panel" id="tab-feed">
      <div class="feed-header">
        <div class="segmented" style="flex: 1; margin-right: 12px;" id="feed-filter">
          <button class="seg-btn active" data-val="all">All</button>
          <button class="seg-btn" data-val="today">Today</button>
          <button class="seg-btn" data-val="7days">7 days</button>
          <button class="seg-btn" data-val="applied">Applied</button>
        </div>
        <button class="mark-all-btn" id="mark-all-btn" style="display:none;">Mark read</button>
      </div>
      <div id="feed-list-container">
        <div class="loading-spinner"><div class="spinner"></div> Loading…</div>
      </div>
    </div>
    <!-- ── TAB 4: SETTINGS ── -->
    <div class="tab-panel" id="tab-settings">
      <div class="section">
        <div class="section-label">Account</div>
        <div style="font-size: 11px; margin-bottom: 4px;" id="settings-account-name"></div>
        <div style="font-size: 9px; color: #888;" id="settings-account-id"></div>
      </div>

      <div class="section">
        <div class="section-label">Notifications</div>
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
          <span style="font-size: 11px;">Email Alerts</span>
          <div class="toggle-switch" id="settings-email-toggle"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Data</div>
        <button id="btn-export-data" class="btn-primary" style="margin-bottom: 8px;">Export my data</button>
        <button id="btn-clear-history" class="btn-primary" style="background: var(--amber); margin-bottom: 8px;">Clear job history</button>
        <button id="btn-reset-ext" class="btn-primary" style="background: var(--red);">Reset extension</button>
      </div>

      <div class="section">
        <div class="section-label">About</div>
        <div style="font-size: 11px; margin-bottom: 4px;">Version 1.0.0</div>
        <a href="#" style="font-size: 11px; color: var(--cyan); text-decoration: none; display: block; margin-bottom: 4px;">Report an issue</a>
        <a href="#" style="font-size: 11px; color: var(--cyan); text-decoration: none; display: block;">What's new</a>
      </div>
      
      <div class="section">
        <div class="section-label">Activity Log</div>
        <div id="activity-log-console" style="background: #000; color: #0f0; font-family: var(--mono); font-size: 9px; padding: 8px; height: 120px; overflow-y: auto; border: 2px solid var(--border); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);">
          <!-- Logs injected here -->
        </div>
        <button id="btn-clear-logs" class="btn-primary" style="margin-top: 8px; font-size: 9px; padding: 4px 8px; background: var(--surface);">Clear Logs</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="popup-footer">
    <div class="latency-badge">
      <div class="latency-dot" id="latency-dot"></div>
      <span id="latency-text">Checking…</span>
    </div>
    <span class="manage-link" id="manage-profile-link">Manage profile →</span>
